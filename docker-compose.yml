version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lexintellectus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lexintellectus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexintellectus_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-lexintellectus}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexintellectus}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lexintellectus-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-lexintellectus_redis_2026}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-lexintellectus_redis_2026}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lexintellectus-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-lexintellectus}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-lexintellectus_minio_2026}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build: ./backend
    container_name: lexintellectus-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://lexintellectus:lexintellectus_dev_2026@postgres:5432/lexintellectus
      REDIS_URL: redis://:lexintellectus_redis_2026@redis:6379/0
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      MINIO_ENDPOINT: minio:9000
      APP_ENV: development
      APP_DEBUG: "true"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_secret_key_change_in_production_2026}
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: lexintellectus-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  minio_data:
